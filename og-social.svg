<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, 'Helvetica Neue', Arial, sans-serif">
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Brand mark: pixel smiley -->
  <g transform="translate(90,80) scale(4.5)" shape-rendering="crispEdges">
    <rect x="4" y="2" width="8" height="2" fill="#ffd93d"/>
    <rect x="2" y="4" width="2" height="8" fill="#ffd93d"/>
    <rect x="12" y="4" width="2" height="8" fill="#ffd93d"/>
    <rect x="4" y="12" width="8" height="2" fill="#ffd93d"/>
    <rect x="5" y="5" width="2" height="2" fill="#2d2d2d"/>
    <rect x="9" y="5" width="2" height="2" fill="#2d2d2d"/>
    <rect x="5" y="9" width="1" height="1" fill="#2d2d2d"/>
    <rect x="6" y="10" width="1" height="1" fill="#2d2d2d"/>
    <rect x="7" y="10" width="2" height="1" fill="#2d2d2d"/>
    <rect x="9" y="10" width="1" height="1" fill="#2d2d2d"/>
    <rect x="10" y="9" width="1" height="1" fill="#2d2d2d"/>
  </g>

  <!-- Headline -->
  <text x="88" y="320" font-size="74" font-weight="700" fill="#111111" letter-spacing="-2">Operations for</text>
  <text x="88" y="410" font-size="74" font-weight="700" fill="#111111" letter-spacing="-2">growing businesses.</text>

  <!-- Subhead -->
  <text x="90" y="485" font-size="34" font-weight="500" fill="#404040">Without hiring a COO or CMO.</text>

  <!-- URL -->
  <text x="90" y="560" font-size="22" fill="#707070" letter-spacing="2">shanegring.com</text>
</svg>
