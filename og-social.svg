<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Menlo, 'SF Mono', monospace">
  <defs>
    <pattern id="grid-fine" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#ffffff" stroke-opacity="0.018"/>
    </pattern>
    <pattern id="grid-major" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M 96 0 L 0 0 0 96" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#000"/>
  <rect width="1200" height="630" fill="url(#grid-fine)"/>
  <rect width="1200" height="630" fill="url(#grid-major)"/>

  <!-- Eyebrow -->
  <text x="80" y="100" font-size="20" fill="#8a8a8a" letter-spacing="4">// SHANE GRING — FRACTIONAL COO</text>

  <!-- Left accent bar -->
  <rect x="80" y="160" width="3" height="245" fill="#ffffff"/>

  <!-- Headline -->
  <text x="110" y="225" font-size="64" font-weight="700" fill="#ffffff">Your business runs</text>
  <text x="110" y="305" font-size="64" font-weight="700" fill="#ffffff">because you do.</text>

  <!-- Divider -->
  <line x1="110" y1="345" x2="500" y2="345" stroke="#444" stroke-width="1"/>

  <!-- Subhead -->
  <text x="110" y="395" font-size="36" fill="#cccccc">That's the problem.</text>

  <!-- Tagline at bottom -->
  <text x="80" y="530" font-size="22" fill="#cccccc">Operations that don't need you in every meeting.</text>

  <!-- URL -->
  <text x="80" y="572" font-size="18" fill="#8a8a8a" letter-spacing="4">SHANEGRING.COM</text>

  <!-- Cursor block bottom-right -->
  <rect x="1088" y="538" width="32" height="40" fill="#ffffff"/>

  <!-- Top-right framing tick -->
  <rect x="1075" y="80" width="50" height="2" fill="#ffffff"/>
  <rect x="1123" y="80" width="2" height="50" fill="#ffffff"/>
</svg>
