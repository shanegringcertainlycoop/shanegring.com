<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 138 1240 462" fill="none" role="img" aria-label="The website off on its own, disconnected, while SEO, design, social assets, strategy, sales, and growth each sit apart as their own island.">
  <!-- the functions live as separate, disconnected islands: a small faded
       card by each, with no line running to any center -->
  <g stroke="#d4d4d4" stroke-width="1.6" fill="#fafafa">
    <rect x="124" y="150" width="172" height="48" rx="8"/>
    <rect x="70"  y="344" width="172" height="48" rx="8"/>
    <rect x="124" y="540" width="172" height="48" rx="8"/>
    <rect x="944" y="150" width="172" height="48" rx="8"/>
    <rect x="998" y="344" width="172" height="48" rx="8"/>
    <rect x="944" y="540" width="172" height="48" rx="8"/>
  </g>

  <!-- the website: a faded box adrift in the middle, wired to nothing -->
  <rect x="500" y="322" width="240" height="150" rx="13" fill="#ffffff" stroke="#c8c8c8" stroke-width="2.2" stroke-dasharray="7 6"/>
  <line x1="500" y1="356" x2="740" y2="356" stroke="#e5e5e5" stroke-width="2"/>
  <circle cx="524" cy="339" r="3.6" fill="none" stroke="#c8c8c8" stroke-width="1.4"/>
  <circle cx="539" cy="339" r="3.6" fill="none" stroke="#c8c8c8" stroke-width="1.4"/>
  <circle cx="554" cy="339" r="3.6" fill="none" stroke="#c8c8c8" stroke-width="1.4"/>
  <line x1="522" y1="386" x2="640" y2="386" stroke="#ededed" stroke-width="3" stroke-linecap="round"/>
  <line x1="522" y1="408" x2="596" y2="408" stroke="#ededed" stroke-width="3" stroke-linecap="round"/>
  <line x1="522" y1="430" x2="624" y2="430" stroke="#ededed" stroke-width="3" stroke-linecap="round"/>
  <text x="620" y="512" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="2.2" fill="#b0b0b0">THE WEBSITE</text>

  <!-- the same six, but greyed and unattached -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Helvetica, Arial, sans-serif" font-size="25" font-weight="600" fill="#a3a3a3">
    <text x="210" y="182" text-anchor="middle">SEO</text>
    <text x="156" y="376" text-anchor="middle">Strategy</text>
    <text x="210" y="572" text-anchor="middle">Social assets</text>
    <text x="1030" y="182" text-anchor="middle">Design</text>
    <text x="1084" y="376" text-anchor="middle">Sales</text>
    <text x="1030" y="572" text-anchor="middle">Growth</text>
  </g>
</svg>
