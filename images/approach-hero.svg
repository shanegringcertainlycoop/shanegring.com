<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 138 1240 462" fill="none" role="img" aria-label="The website at the center, with SEO, design, social assets, strategy, sales, and growth all emanating from it.">
  <defs>
    <marker id="ah-dark" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto">
      <path d="M0.5,1 L8.5,5 L0.5,9" fill="none" stroke="#404040" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
