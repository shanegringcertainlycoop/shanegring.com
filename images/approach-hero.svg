<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 560" fill="none" role="img" aria-label="The website at the center, with concentric rings rippling outward, and SEO, design, strategy, sales, social assets, and growth sitting in an even orbit around it.">
  <!-- rings rippling outward from the hub; fainter as they widen -->
  <g fill="none">
    <circle cx="320" cy="280" r="78"  stroke="#c9c9c9" stroke-width="1.6"/>
    <circle cx="320" cy="280" r="128" stroke="#d8d8d8" stroke-width="1.5"/>
    <circle cx="320" cy="280" r="178" stroke="#e4e4e4" stroke-width="1.4"/>
  </g>

  <!-- the website: the hub -->
  <rect x="258" y="232" width="124" height="96" rx="13" fill="#ffffff" stroke="#111111" stroke-width="2.6"/>
  <line x1="258" y1="262" x2="382" y2="262" stroke="#d4d4d4" stroke-width="2"/>
  <circle cx="278" cy="247" r="3.6" fill="none" stroke="#707070" stroke-width="1.5"/>
  <circle cx="292" cy="247" r="3.6" fill="none" stroke="#707070" stroke-width="1.5"/>
  <circle cx="306" cy="247" r="3.6" fill="none" stroke="#707070" stroke-width="1.5"/>
  <rect x="274" y="274" width="92" height="18" rx="4" fill="#fafafa" stroke="#111111" stroke-width="1.4"/>
  <rect x="274" y="300" width="42" height="20" rx="4" fill="#fafafa" stroke="#111111" stroke-width="1.4"/>
  <rect x="324" y="300" width="42" height="20" rx="4" fill="#fafafa" stroke="#111111" stroke-width="1.4"/>
  <text x="320" y="364" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="2" fill="#707070">THE WEBSITE</text>

  <!-- the six, sitting on the outer ring, evenly around -->
  <g fill="#111111">
    <circle cx="231" cy="126" r="5"/>
    <circle cx="409" cy="126" r="5"/>
    <circle cx="142" cy="280" r="5"/>
    <circle cx="498" cy="280" r="5"/>
    <circle cx="231" cy="434" r="5"/>
    <circle cx="409" cy="434" r="5"/>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#111111">
    <text x="214" y="116" text-anchor="end">SEO</text>
    <text x="426" y="116" text-anchor="start">Design</text>
    <text x="126" y="288" text-anchor="end">Strategy</text>
    <text x="514" y="288" text-anchor="start">Sales</text>
    <text x="214" y="456" text-anchor="end">Social assets</text>
    <text x="426" y="456" text-anchor="start">Growth</text>
  </g>
</svg>
